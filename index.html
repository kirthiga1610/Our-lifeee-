<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>For Him ❤️</title>

<style>
body{margin:0;font-family:Arial;background:black;color:white}

/* LOCKSCREEN */
#lockscreen{
 height:100vh;
 background:url('lock.jpg') center/cover no-repeat;
 display:flex;flex-direction:column;justify-content:space-between;
 padding:20px;
}
.time{font-size:50px;text-align:center;margin-top:40px}
.notif{background:rgba(0,0,0,0.6);padding:12px;border-radius:12px;cursor:pointer}

/* CHAT */
#app{display:none;height:100vh}
.header{background:#202c33;padding:12px;display:flex;align-items:center}
.dp{width:40px;height:40px;border-radius:50%;margin-right:10px}

.chat{
 padding:10px;height:75vh;overflow-y:auto;
 display:flex;flex-direction:column;gap:10px;
 background:linear-gradient(rgba(0,0,0,0.4),rgba(0,0,0,0.4)),
 url('chatbg.jpg') center/cover;
}

.msg{max-width:70%;padding:10px;border-radius:10px;font-size:14px}
.sent{background:#005c4b;align-self:flex-end}
.received{background:#202c33;align-self:flex-start}

.msg img{width:100%;border-radius:10px}

/* typing */
.typing{
 background:#202c33;padding:10px;border-radius:10px;
 width:60px;display:flex;justify-content:space-around;
}
.dot{width:6px;height:6px;background:white;border-radius:50%;
 animation:blink 1.4s infinite}
.dot:nth-child(2){animation-delay:.2s}
.dot:nth-child(3){animation-delay:.4s}

@keyframes blink{
 0%,80%,100%{opacity:.2}
 40%{opacity:1}
}

/* ticks */
.ticks{font-size:10px;text-align:right;color:gray}
.blue{color:#4fc3f7}

/* voice */
.play{
 width:30px;height:30px;background:white;color:black;
 border-radius:50%;display:flex;justify-content:center;
 align-items:center;cursor:pointer
}

.input{position:fixed;bottom:0;width:100%;background:#202c33;padding:10px}
</style>
</head>

<body>

<div id="lockscreen">
 <div class="time" id="time"></div>
 <div class="notif" onclick="openChat()">
   <b id="namePreview"></b><br>💬 1 new message
 </div>
</div>

<div id="app">
 <div class="header">
   <img id="dp" class="dp">
   <div>
     <div id="name"></div>
     <small id="status">online</small>
   </div>
 </div>

 <div class="chat" id="chat"></div>
 <div class="input">Type a message...</div>
</div>

<audio id="voiceAudio">
 <source src="voice.mp3">
</audio>

<script>

/* PERSONAL */
let userName="Kirthiiii👑❤️";
let dpImage="photo.jpg";

name.innerText=userName;
namePreview.innerText=userName;
dp.src=dpImage;

/* TIME */
function updateTime(){
 let n=new Date();
 let h=n.getHours(),m=n.getMinutes();
 if(m<10)m="0"+m;
 time.innerText=h+":"+m;
}
setInterval(updateTime,1000);updateTime();

/* OPEN */
function openChat(){
 lockscreen.style.display="none";
 app.style.display="block";
 startChat();
}

/* 💬 CHAT WITH 3 PHOTOS */
let messages=[

{type:"sent", text:"Hey..."},
{type:"sent", text:"Thoongitiya...?"},
{type:"received", text:"Illa ma... sollu ❤️"},

{type:"sent", text:"Inniku romba neram aachu... but suddenly unna romba miss panren..."},
{type:"received", text:"Aww... enna aachu ma? 😌"},

{type:"sent", text:"Random ah namma old chats ellam paathen..."},
{type:"sent", text:"Namma first days... epdi pesuvom nu 😭"},

/* 📸 PHOTO 1 */
{type:"sent", img:"photo1.jpg"},

{type:"received", text:"Haha... adhula nee romba innocent ah irundha 😂❤️"},

{type:"sent", text:"But seriously... those days romba azhaga irundhudhu..."},
{type:"received", text:"Ippo illa nu sollriya? 😏"},

{type:"sent", text:"Ippo better dhaan... but konjam complicated..."},
{type:"received", text:"Hmm... adhuvum namma dhaan manage pannuvom ❤️"},

{type:"sent", text:"Naan sollala... but sometimes bayama irukum..."},
{type:"received", text:"Enna bayam ma?"},

{type:"sent", text:"Nee oru naal enna vittu poiduva nu..."},
{type:"sent", text:"Fight aana odane nee 'separate' nu solradhu... adhu romba hurt aagudhu..."},

/* 📸 PHOTO 2 */
{type:"sent", img:"photo2.jpg"},

{type:"received", text:"Heyyy... naan enga pogaren? ❤️"},
{type:"received", text:"Kovathula pesuven... but adhu heart la illa ma..."},

{type:"received", text:"Naan epovume unna thaan choose panren ❤️"},

{type:"sent", text:"Theriyum... but andha moment la naan break aayiduven..."},
{type:"received", text:"Sorry ma... next time careful ah iruken... promise 🤝"},

{type:"sent", text:"Naan overthink panniduven..."},
{type:"received", text:"Adhaan naan unna love panren ❤️"},

{type:"sent", text:"Nee enaku romba important... seriously..."},

/* 📸 PHOTO 3 */
{type:"sent", img:"photo3.jpg"},

{type:"received", text:"Nee enaku life ma... idhu marakkadha 🥺"},

{type:"sent", text:"Namma ipdiye irukanum... please..."},
{type:"received", text:"Irupom... edhu nadandhalum ❤️"},

{type:"sent", text:"Promise?"},
{type:"received", text:"Promise 🤝 naan unna vida maaten"},

{type:"sent", text:"I love you..."},
{type:"received", text:"I love you more ❤️"},

{type:"sent", text:"One last thing..."},
{type:"received", text:"Enna ma?"},

/* 🎙️ VOICE NOTE */
{type:"sent", voice:true},

{type:"received", text:"Heard it..."},
{type:"received", text:"Idhellam yosikaadha... naan unna vida maaten... ever ❤️"},

{type:"sent", text:"Okay... ippo konjam better ah feel aagudhu..."},
{type:"received", text:"Good girl 😌 sleep peacefully now ❤️"}

];

let i=0,chat=document.getElementById("chat");

/* typing */
function showTyping(cb){
 let t=document.createElement("div");
 t.className="typing";
 t.innerHTML=`<div class="dot"></div><div class="dot"></div><div class="dot"></div>`;
 chat.appendChild(t);
 status.innerText="typing...";

 setTimeout(()=>{
  t.remove();
  status.innerText="online";
  cb();
 },1500);
}

/* ticks */
function addTicks(div){
 let t=document.createElement("div");
 t.className="ticks";
 t.innerText="✔";
 div.appendChild(t);

 setTimeout(()=>{t.innerText="✔✔"},800);
 setTimeout(()=>{t.classList.add("blue")},1600);
}

/* show message */
function showMessage(){
 if(i>=messages.length)return;
 let m=messages[i];

 showTyping(()=>{
  let d=document.createElement("div");
  d.className="msg "+m.type;

  if(m.text)d.innerText=m.text;

  if(m.img){
   let img=document.createElement("img");
   img.src=m.img;
   d.appendChild(img);
  }

  if(m.voice){
   let btn=document.createElement("div");
   btn.className="play";
   btn.innerText="▶";
   d.appendChild(btn);

   let audio=document.getElementById("voiceAudio");
   btn.onclick=()=>{audio.paused?audio.play():audio.pause();}
  }

  if(m.type==="sent") addTicks(d);

  chat.appendChild(d);
  chat.scrollTop=chat.scrollHeight;

  i++;
  setTimeout(showMessage,1300);
 });
}

function startChat(){setTimeout(showMessage,1000)}

</script>

</body>
</html>
