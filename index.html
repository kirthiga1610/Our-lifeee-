<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>For You ❤️</title>

<style>
body {
  margin: 0;
  font-family: Arial, sans-serif;
  background: black;
  color: white;
}

/* LOCK SCREEN */
#lockscreen {
  height: 100vh;
  background: url('photo1.jpg') center/cover;
  display: flex;
  flex-direction: column;
  justify-content: space-between;
  padding: 20px;
}

.time {
  font-size: 50px;
  text-align: center;
  margin-top: 40px;
}

.notif {
  background: rgba(0,0,0,0.6);
  padding: 12px;
  border-radius: 12px;
  cursor: pointer;
}

/* CHAT */
#app {
  display: none;
  background: #0b141a;
  height: 100vh;
}

.header {
  background: #202c33;
  padding: 12px;
  display: flex;
  align-items: center;
}

.dp {
  width: 40px;
  height: 40px;
  border-radius: 50%;
  margin-right: 10px;
}

.chat {
  padding: 10px;
  height: 75vh;
  overflow-y: auto;
  display: flex;
  flex-direction: column;
  gap: 10px;
  background: linear-gradient(rgba(0,0,0,0.4), rgba(0,0,0,0.4)),
              url('chatbg.jpg') center/cover no-repeat;
}

.msg {
  max-width: 70%;
  padding: 10px;
  border-radius: 10px;
  font-size: 14px;
}

.sent {
  background: #005c4b;
  align-self: flex-end;
}

.received {
  background: #202c33;
  align-self: flex-start;
}

.msg img {
  width: 100%;
  border-radius: 10px;
}

/* TYPING */
.typing {
  background: #202c33;
  padding: 10px;
  border-radius: 10px;
  width: 60px;
  display: flex;
  justify-content: space-around;
}

.dot {
  width: 6px;
  height: 6px;
  background: white;
  border-radius: 50%;
  animation: blink 1.4s infinite;
}

.dot:nth-child(2) { animation-delay: 0.2s; }
.dot:nth-child(3) { animation-delay: 0.4s; }

@keyframes blink {
  0%, 80%, 100% { opacity: 0.2; }
  40% { opacity: 1; }
}

/* VOICE */
.voice {
  display: flex;
  align-items: center;
  gap: 10px;
}

.play {
  width: 30px;
  height: 30px;
  background: white;
  color: black;
  border-radius: 50%;
  display: flex;
  justify-content: center;
  align-items: center;
  cursor: pointer;
}

/* TICKS */
.ticks {
  font-size: 10px;
  text-align: right;
}

.input {
  position: fixed;
  bottom: 0;
  width: 100%;
  background: #202c33;
  padding: 10px;
}
</style>
</head>

<body>

<div id="lockscreen">
  <div class="time" id="time"></div>
  <div class="notif" onclick="openChat()">
    <b id="namePreview"></b><br>
    💬 New message
  </div>
</div>

<div id="app">
  <div class="header">
    <img id="dp" class="dp">
    <div>
      <div id="name"></div>
      <small id="status">online</small>
    </div>
  </div>

  <div class="chat" id="chat"></div>
  <div class="input">Type a message...</div>
</div>

<audio id="music" loop>
  <source src="song.mp3">
</audio>

<audio id="voiceAudio">
  <source src="voice.mp3">
</audio>

<script>

/* PERSONALIZE */
let userName = "Lokiiiiiiiiii ❤️";
let dpImage = "photo.jpg";

name.innerText = userName;
namePreview.innerText = userName;
dp.src = dpImage;

/* TIME */
function updateTime(){
  let now = new Date();
  let h = now.getHours();
  let m = now.getMinutes();
  if(m<10) m="0"+m;
  time.innerText = h + ":" + m;
}
setInterval(updateTime,1000);
updateTime();

/* OPEN */
function openChat(){
  lockscreen.style.display="none";
  app.style.display="block";
  music.play();
  startChat();
}

/* 💬 FULL ORIGINAL CHAT */

{type:"sent", text:"Even when nee sollra 'I won’t leave'..."},

{type:"received", text:"Naan enga pogaren ❤️"},

{type:"received", img:"photo2.jpg"},
{type:"received", text:"Paathu sollu... naan un kitta ipdi dhaan iruken"},

{type:"sent", text:"Appo fight aagumbodhu 'let’s separate' nu solluva enna..."},

{type:"sent", text:"Deal ❤️"},

{type:"received", text:"Edhu nadandhalum..."},

let i=0;
let chat=document.getElementById("chat");

/* TYPING */
function showTyping(callback){
  let t=document.createElement("div");
  t.className="typing";
  t.innerHTML=`<div class="dot"></div><div class="dot"></div><div class="dot"></div>`;
  chat.appendChild(t);
  status.innerText="typing...";

  setTimeout(()=>{
    t.remove();
    status.innerText="online";
    callback();
  },1500);
}

/* MESSAGE */
function showMessage(){
  if(i>=messages.length) return;

  let m=messages[i];

  showTyping(()=>{
    let div=document.createElement("div");
    div.className="msg "+m.type;

    if(m.text) div.innerText=m.text;

    if(m.img){
      let img=document.createElement("img");
      img.src=m.img;
      div.appendChild(img);
    }

    if(m.voice){
      let btn=document.createElement("div");
      btn.className="play";
      btn.innerText="▶";
      div.appendChild(btn);

      let audio=document.getElementById("voiceAudio");
      btn.onclick=()=>{
        audio.paused?audio.play():audio.pause();
      };
    }

    if(m.type==="sent"){
      let t=document.createElement("div");
      t.className="ticks";
      t.innerText="✔✔";
      div.appendChild(t);
    }

    chat.appendChild(div);
    chat.scrollTop=chat.scrollHeight;

    i++;
    setTimeout(showMessage,1200);
  });
}

function startChat(){
  setTimeout(showMessage,1000);
}

</script>

</body>
</html>
